{% extends 'base.html' %}
{% block content %}
<div class="edit-wrap">
  <a href="/equipo" class="back-link">← Volver a Equipo</a>
  <div class="page-header" style="margin-bottom:20px;">
    <div>
      <h1>Editar Equipo</h1>
      <p>{{ item.nombre }}</p>
    </div>
  </div>
  <div class="form-panel">
    <form action="/equipo/edit/{{ item.id }}" method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre *</label>
          <input type="text" name="nombre" required value="{{ item.nombre }}">
        </div>
        <div class="form-group">
          <label>Marca</label>
          <input type="text" name="marca" value="{{ item.marca or '' }}">
        </div>
        <div class="form-group">
          <label>Tipo</label>
          <select name="tipo">
            <option value="">— seleccionar —</option>
            <option value="brewer"  {{ 'selected' if item.tipo == 'brewer' }}>Brewer</option>
            <option value="grinder" {{ 'selected' if item.tipo == 'grinder' }}>Grinder</option>
            <option value="otro"    {{ 'selected' if item.tipo == 'otro' }}>Otro</option>
          </select>
        </div>
        <div class="form-group">
          <label>Fecha de Adquisición</label>
          <input type="date" name="fecha_adquisicion" value="{{ item.fecha_adquisicion or '' }}">
        </div>
        <div class="form-group full">
          <label>Notas</label>
          <textarea name="notas">{{ item.notas or '' }}</textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
        <a href="/equipo" class="btn btn-ghost">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
