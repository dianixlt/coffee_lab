{% extends 'base.html' %}
{% block content %}
<div class="edit-wrap">
  <a href="/sesiones" class="back-link">← Volver a Sesiones</a>
  <div class="page-header" style="margin-bottom:20px;">
    <div><h1>Editar Sesión</h1></div>
  </div>
  <div class="form-panel">
    <form action="/sesiones/edit/{{ sesion.id }}" method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>Café</label>
          <select name="cafe_id">
            <option value="">— sin café —</option>
            {% for c in cafes %}
              <option value="{{ c.id }}" {{ 'selected' if sesion.cafe_id == c.id }}>{{ c.nombre }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Método</label>
          <select name="metodo">
            <option value="">— seleccionar —</option>
            <option value="V60"       {{ 'selected' if sesion.metodo == 'V60' }}>V60</option>
            <option value="Switch"    {{ 'selected' if sesion.metodo == 'Switch' }}>Switch</option>
            <option value="Chemex"    {{ 'selected' if sesion.metodo == 'Chemex' }}>Chemex</option>
            <option value="AeroPress" {{ 'selected' if sesion.metodo == 'AeroPress' }}>AeroPress</option>
            <option value="UFO-V2"    {{ 'selected' if sesion.metodo == 'UFO-V2' }}>UFO V2</option>
          </select>
        </div>
        <div class="form-group">
          <label>Fecha</label>
          <input type="date" name="fecha" value="{{ sesion.fecha or '' }}">
        </div>
        <div class="form-group">
          <label>Puntuación (1–10)</label>
          <input type="number" name="puntuacion" min="1" max="10" step="0.5" value="{{ sesion.puntuacion or '' }}">
        </div>
        <div class="form-group full">
          <label>Notas de la Sesión</label>
          <textarea name="notas">{{ sesion.notas or '' }}</textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
        <a href="/sesiones" class="btn btn-ghost">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
